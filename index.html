<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nseUpload - Industrial File Engine</title>
    <style>
        /* ==========================================================================
           INDUSTRIAL REGIME STYLE - RAW, BRUTALIST & HIGH-CONTRAST
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            /* Pola latar belakang garis-garis mesh baja industrial */
            background-image: linear-gradient(335deg, #141414 23px, transparent 23px),
                              linear-gradient(155deg, #141414 23px, transparent 23px),
                              linear-gradient(335deg, #141414 23px, transparent 23px),
                              linear-gradient(155deg, #141414 23px, transparent 23px);
            background-size: 58px 58px;
            background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .industrial-panel {
            background-color: #2b2b2b;
            border: 4px solid #3d3d3d;
            border-top: 6px solid #e67e22; /* Aksen warna karat / oranye industrial */
            border-radius: 0px; /* Industrial bersifat kaku & angular */
            width: 100%;
            max-width: 560px;
            padding: 35px;
            box-shadow: 10px 10px 0px #111111;
            position: relative;
        }

        /* Rivet/Baut Dekorasi Sudut Panel */
        .industrial-panel::before, .industrial-panel::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #555;
            border-radius: 50%;
            box-shadow: inset -1px -1px 2px #000, 1px 1px 1px #fff;
        }
        .industrial-panel::before { top: 10px; left: 10px; }
        .industrial-panel::after { top: 10px; right: 10px; }

        /* LOGO nseUpload CUSTOM */
        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #444;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #111;
            display: inline-block;
        }

        .logo-dot {
            color: #00d2ff; /* Warna biru muda menyala */
            font-size: 36px;
            line-height: 0;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
        }

        .subtitle {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        /* FORM CONTROLS */
        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 12px;
            color: #aaaaaa;
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            background-color: #1e1e1e;
            border: 2px solid #444;
            color: #00ff66; /* Warna font monitor terminal jadul */
            border-radius: 0px;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #e67e22;
            background-color: #151515;
            outline: none;
            box-shadow: 0 0 8px rgba(230, 126, 34, 0.5);
        }

        /* INDUSTRIAL UPLOAD ZONE (Tombol Upload Terintegrasi) */
        .upload-zone {
            position: relative;
            margin-bottom: 25px;
        }

        .upload-box {
            border: 3px dashed #e67e22;
            padding: 30px 20px;
            text-align: center;
            background-color: #222222;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-box:hover {
            background-color: #1e1e1e;
            border-color: #f39c12;
        }

        .upload-box p {
            font-size: 13px;
            color: #e67e22;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #fileInput {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-meta {
            margin-top: 12px;
            font-size: 12px;
            color: #00d2ff; /* Output info berwarna biru muda */
            word-break: break-all;
            background-color: #1a1a1a;
            padding: 8px;
            border-left: 3px solid #00d2ff;
            display: none;
        }

        /* SUBMIT BUTTON - HEAVY DUTY MACHINERY STYLE */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #111111;
            background-color: #e67e22;
            border: none;
            border-bottom: 4px solid #d35400;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.1s ease;
        }

        .btn-submit:hover {
            background-color: #f39c12;
            border-bottom-width: 4px;
        }

        .btn-submit:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .btn-submit:disabled {
            background-color: #444444;
            border-bottom: 4px solid #333333;
            color: #777777;
            cursor: not-allowed;
            transform: none;
        }

        /* MONITOR STATUS CONSOLE */
        #statusConsole {
            margin-top: 25px;
            padding: 12px;
            font-size: 12px;
            display: none;
            border-left: 4px solid transparent;
            text-transform: uppercase;
        }

        .console-success {
            background-color: rgba(0, 255, 102, 0.1);
            border-color: #00ff66;
            color: #00ff66;
        }

        .console-error {
            background-color: rgba(255, 51, 51, 0.1);
            border-color: #ff3333;
            color: #ff3333;
        }

        .console-loading {
            background-color: rgba(230, 126, 34, 0.1);
            border-color: #e67e22;
            color: #e67e22;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="industrial-panel">
    
    <!-- HEADER LOGO INDUSTRIAL -->
    <div class="logo-container">
        <div class="logo-text">nseUpload<span class="logo-dot">.</span></div>
        <div class="subtitle">[ TERMINAL TRANSMISI REPOSITORI ]</div>
    </div>

    <!-- KREDENSIAL METER -->
    <div class="control-group">
        <label for="githubToken">> GITHUB ACCESS TOKEN</label>
        <input type="password" id="githubToken" placeholder="MASUKKAN TOKEN API...">
    </div>

    <div class="control-group">
        <label for="username">> USERNAME REPO</label>
        <input type="text" id="username" placeholder="USERNAME GITHUB...">
    </div>

    <div class="control-group">
        <label for="repoName">> NAMA TARGET REPOSITORI</label>
        <input type="text" id="repoName" placeholder="NAMA REPO...">
    </div>

    <div class="control-group">
        <label for="commitMessage">> LOG PESAN COMMIT</label>
        <input type="text" id="commitMessage" value="SYSTEM_UPLOAD: TRANSMISI DATA DILAKUKAN">
    </div>

    <!-- TRANSMISSION MODULE (UPLOAD BOX) -->
    <label>> MUAT ELEMEN DATA (UPLOAD)</label>
    <div class="upload-zone">
        <div class="upload-box" id="dropBox">
            <p id="uploadPrompt">// KLIK / SERET FILE UNTUK DIUNGGAH //</p>
            <div id="fileMeta" class="file-meta"></div>
        </div>
        <input type="file" id="fileInput">
    </div>

    <!-- ACTION INITIATION -->
    <button type="button" id="submitBtn" class="btn-submit" disabled>EKSEKUSI DATA (SUBMIT)</button>

    <!-- STATUS CONSOLE MONITOR -->
    <div id="statusConsole"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const uploadPrompt = document.getElementById('uploadPrompt');
    const fileMeta = document.getElementById('fileMeta');
    const submitBtn = document.getElementById('submitBtn');
    const statusConsole = document.getElementById('statusConsole');

    let selectedFile = null;

    // Aksi ketika modul upload dipicu
    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            selectedFile = e.target.files[0];
            fileMeta.style.display = 'block';
            fileMeta.textContent = `BERKAS SIAP: ${selectedFile.name.toUpperCase()} [${(selectedFile.size / 1024).toFixed(2)} KB]`;
            submitBtn.disabled = false;
            clearConsole();
        } else {
            resetEngine();
        }
    });

    function resetEngine() {
        selectedFile = null;
        fileMeta.style.display = 'none';
        fileMeta.textContent = '';
        submitBtn.disabled = true;
    }

    function clearConsole() {
        statusConsole.style.display = 'none';
        statusConsole.className = '';
    }

    function writeConsole(text, mode) {
        if (!text) {
            clearConsole();
            return;
        }
        statusConsole.className = '';
        statusConsole.style.display = 'block';
        statusConsole.textContent = `>>> STATUS: ${text}`;
        
        if (mode === 'success') statusConsole.classList.add('console-success');
        if (mode === 'error') statusConsole.classList.add('console-error');
        if (mode === 'loading') statusConsole.classList.add('console-loading');
    }

    // Eksekusi pengiriman data ke GitHub
    submitBtn.addEventListener('click', async function() {
        const token = document.getElementById('githubToken').value.trim();
        const username = document.getElementById('username').value.trim();
        const repo = document.getElementById('repoName').value.trim();
        const commitMsg = document.getElementById('commitMessage').value.trim() || 'SYSTEM_UPLOAD: TRANSMISI DATA DILAKUKAN';

        if (!token || !username || !repo) {
            writeConsole('ERROR! KREDENSIAL ENGINE HARUS DIISI LENGKAP!', 'error');
            return;
        }

        if (!selectedFile) {
            writeConsole('ERROR! ELEMEN DATA KOSONG!', 'error');
            return;
        }

        writeConsole('MENGONVERSI DATA & TRANSMISI SEDANG BERJALAN...', 'loading');
        submitBtn.disabled = true;

        const reader = new FileReader();
        reader.readAsDataURL(selectedFile);
        
        reader.onload = async function () {
            const base64Content = reader.result.split(',')[1];
            const path = selectedFile.name; 
            const url = `https://api.github.com/repos/${username}/${repo}/contents/${encodeURIComponent(path)}`;

            try {
                let sha = null;
                const checkResponse = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (checkResponse.ok) {
                    const fileData = await checkResponse.json();
                    sha = fileData.sha; 
                }

                const bodyData = {
                    message: commitMsg,
                    content: base64Content
                };
                if (sha) {
                    bodyData.sha = sha;
                }

                const uploadResponse = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify(bodyData)
                });

                if (uploadResponse.ok) {
                    writeConsole(`TRANSMISI BERHASIL! BERKAS "${selectedFile.name.toUpperCase()}" SUKSES TERKIRIM KE REPO [${repo.toUpperCase()}].`, 'success');
                    resetEngine();
                } else {
                    const errorData = await uploadResponse.json();
                    writeConsole(`TRANSMISI GAGAL: ${errorData.message.toUpperCase() || 'UNKNOWN ERROR'}`, 'error');
                    submitBtn.disabled = false;
                }

            } catch (error) {
                writeConsole(`KESALAHAN JARINGAN/API: ${error.message.toUpperCase()}`, 'error');
                submitBtn.disabled = false;
            }
        };

        reader.onerror = function () {
            writeConsole('GAGAL MEMBACA ELEMEN DATA LOKAL.', 'error');
            submitBtn.disabled = false;
        };
    });
</script>

</body>
</html>
